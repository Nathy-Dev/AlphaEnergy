<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Energy | Solar Installation, CCTV & Smart Home Services</title>
    <meta
      name="description"
      content="Alpha Energy — Nigeria's trusted solar engineering company. Solar panel installation, CCTV security systems & smart home automation for homes and businesses."
    />
    <meta
      name="keywords"
      content="solar installation, solar panels, CCTV, security cameras, smart home, Nigeria, Lagos, energy audit"
    />
    <meta property="og:title" content="Alpha Energy | Smart Home Services" />
    <meta
      property="og:description"
      content="Solar installation, CCTV & smart home automation. Powering the future with clean energy."
    />
    <meta property="og:type" content="website" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script>
      window.addEventListener('error', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.right = '0';
        errorDiv.style.background = 'red';
        errorDiv.style.color = 'white';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.innerHTML = '<h2>Global Error Captured!</h2><p>' + event.message + '</p><pre>' + (event.error && event.error.stack ? event.error.stack : '') + '</pre>';
        document.body.appendChild(errorDiv);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.right = '0';
        errorDiv.style.background = 'orange';
        errorDiv.style.color = 'white';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.innerHTML = '<h2>Unhandled Promise Rejection!</h2><p>' + event.reason + '</p><pre>' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</pre>';
        document.body.appendChild(errorDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
